<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A4B Elite | Complete Evaluation Suite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #020916;
            --bg-panel: rgba(7, 22, 46, 0.82);
            --bg-panel-soft: rgba(8, 27, 58, 0.62);
            --line: rgba(111, 173, 255, 0.24);
            --line-strong: rgba(111, 173, 255, 0.45);
            --text-main: #f4f9ff;
            --text-soft: #91a6c7;
            --accent: #17d9ff;
            --accent-2: #5dff9f;
            --accent-3: #ff8a3d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Space Grotesk", sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            background:
                radial-gradient(circle at 18% 10%, rgba(23, 217, 255, 0.18), transparent 34%),
                radial-gradient(circle at 82% 86%, rgba(93, 255, 159, 0.15), transparent 35%),
                linear-gradient(130deg, #01050f 0%, #041022 45%, #020916 100%);
            padding: 18px;
        }

        .app-shell {
            max-width: 1500px;
            min-height: calc(100vh - 36px);
            margin: 0 auto;
            border: 1px solid var(--line);
            border-radius: 28px;
            display: grid;
            grid-template-columns: 250px 1fr;
            overflow: hidden;
            backdrop-filter: blur(6px);
            box-shadow: 0 34px 80px rgba(0, 0, 0, 0.45);
            background: rgba(2, 9, 23, 0.75);
        }

        .side {
            border-right: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(2, 14, 34, 0.98), rgba(3, 11, 24, 0.9));
            display: flex;
            flex-direction: column;
            padding: 22px 14px;
            gap: 14px;
        }

        .brand {
            padding: 8px 10px 14px;
            border-bottom: 1px solid var(--line);
            margin-bottom: 2px;
        }

        .brand h1 {
            font-family: "Sora", sans-serif;
            font-size: 2rem;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .brand h1 span { color: var(--accent); }
        .brand small {
            color: var(--text-soft);
            letter-spacing: 1.3px;
            font-size: 0.74rem;
            text-transform: uppercase;
        }

        .menu {
            list-style: none;
            display: grid;
            gap: 6px;
            margin-top: 4px;
        }

        .menu button {
            width: 100%;
            border: 1px solid transparent;
            color: #c5d4eb;
            background: transparent;
            border-radius: 10px;
            padding: 11px 12px;
            text-align: left;
            font: 600 0.9rem "Space Grotesk", sans-serif;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .menu button:hover {
            border-color: var(--line);
            background: rgba(23, 217, 255, 0.1);
        }

        .menu button.active {
            background: linear-gradient(90deg, rgba(23, 217, 255, 0.24), rgba(93, 255, 159, 0.2));
            border-color: rgba(93, 255, 159, 0.55);
            color: #f8fdff;
        }

        .roster-card,
        .coach-card {
            border: 1px solid var(--line);
            background: var(--bg-panel-soft);
            border-radius: 12px;
            padding: 12px;
        }

        .roster-card h3,
        .coach-card h3 {
            font-size: 0.87rem;
            margin-bottom: 8px;
        }

        .roster-list {
            display: grid;
            gap: 6px;
        }

        .roster-list button {
            width: 100%;
            text-align: left;
            border: 1px solid var(--line);
            background: rgba(5, 20, 41, 0.7);
            color: #d8e8ff;
            border-radius: 9px;
            padding: 8px;
            font: 600 0.8rem "Space Grotesk", sans-serif;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .roster-list button small {
            display: block;
            color: var(--text-soft);
            font-weight: 500;
            margin-top: 3px;
        }

        .roster-list button:hover,
        .roster-list button.active {
            border-color: rgba(93, 255, 159, 0.72);
            background: rgba(17, 217, 255, 0.16);
        }

        .coach-card { margin-top: auto; }
        .coach-card p {
            color: var(--text-soft);
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .coach-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .coach-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(130deg, #1f3e6f, #082c59);
            border: 1px solid var(--line-strong);
        }

        .main {
            display: flex;
            flex-direction: column;
            padding: 14px;
            gap: 10px;
        }

        .topbar {
            border: 1px solid var(--line);
            background: rgba(3, 14, 32, 0.7);
            border-radius: 12px;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .topbar h2 {
            font-size: 0.95rem;
            color: #d2e6ff;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .actions select,
        .actions button {
            border: 1px solid var(--line);
            background: #04152f;
            color: #d7e6fb;
            padding: 8px 11px;
            border-radius: 8px;
            font: 600 0.82rem "Space Grotesk", sans-serif;
            cursor: pointer;
        }

        .actions button.primary {
            border-color: rgba(93, 255, 159, 0.65);
            background: linear-gradient(130deg, rgba(23, 217, 255, 0.3), rgba(93, 255, 159, 0.3));
        }

        .actions button.warn {
            border-color: rgba(255, 138, 61, 0.65);
            background: linear-gradient(130deg, rgba(255, 138, 61, 0.3), rgba(255, 95, 109, 0.22));
        }

        .actions button.edit {
            border-color: rgba(23, 217, 255, 0.7);
            background: rgba(23, 217, 255, 0.18);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 10px;
        }

        .card {
            border: 1px solid var(--line);
            border-radius: 12px;
            background: var(--bg-panel);
            padding: 12px;
        }

        .section-card.hidden {
            display: none !important;
        }

        .profile {
            grid-column: span 8;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 12px;
            align-items: center;
        }

        .avatar {
            width: 92px;
            height: 92px;
            border-radius: 50%;
            border: 2px solid var(--line-strong);
            background: conic-gradient(from 40deg, #2d6bb8, #0d203e, #2d6bb8);
            position: relative;
        }

        .avatar::after {
            content: "";
            position: absolute;
            inset: 8px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 28%, #face9a 0%, #d09766 32%, #4a3124 88%);
        }

        .player-name {
            font-family: "Sora", sans-serif;
            font-size: clamp(1.3rem, 2.3vw, 1.9rem);
            font-weight: 800;
            line-height: 1.05;
        }

        .player-name span { color: var(--accent); }

        .subline {
            color: var(--text-soft);
            margin-top: 5px;
            font-size: 0.85rem;
        }

        .stats-row {
            margin-top: 10px;
            display: grid;
            grid-template-columns: repeat(7, minmax(52px, 1fr));
            gap: 8px;
        }

        .chip {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 6px;
            background: rgba(4, 20, 44, 0.75);
        }

        .chip strong {
            display: block;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #7f9bc2;
        }

        .chip span {
            display: block;
            margin-top: 2px;
            font-size: 0.91rem;
            font-weight: 700;
        }

        .overall {
            grid-column: span 4;
            display: grid;
            grid-template-columns: 138px 1fr;
            gap: 10px;
            align-items: center;
        }

        .ring-wrap {
            display: grid;
            place-items: center;
            height: 130px;
            width: 130px;
            margin: 0 auto;
            border-radius: 50%;
            background: conic-gradient(var(--accent) calc(var(--score, 87) * 1%), rgba(11, 34, 68, 0.9) 0);
            position: relative;
        }

        .ring-wrap::before {
            content: "";
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            background: #031328;
            border: 1px solid var(--line);
        }

        .ring-score {
            position: relative;
            text-align: center;
            font-family: "Sora", sans-serif;
        }

        .ring-score b {
            font-size: 2rem;
            line-height: 1;
        }

        .ring-score small {
            display: block;
            margin-top: 2px;
            color: var(--text-soft);
            font-size: 0.73rem;
            letter-spacing: 0.35px;
            text-transform: uppercase;
        }

        .trait-list {
            list-style: none;
            display: grid;
            gap: 8px;
            font-size: 0.86rem;
        }

        .trait-list li {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed rgba(111, 173, 255, 0.2);
            padding-bottom: 5px;
        }

        .trait-list li span:last-child {
            color: var(--accent-2);
            font-weight: 700;
        }

        .skills,
        .shot,
        .athleticism,
        .mentality,
        .iq,
        .notes,
        .report {
            grid-column: span 6;
        }

        .card-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.88rem;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            color: #cee0fa;
            font-weight: 700;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 7px 6px;
            border-bottom: 1px solid rgba(111, 173, 255, 0.18);
            font-size: 0.82rem;
            vertical-align: middle;
        }

        th {
            color: #85a0c8;
            text-transform: uppercase;
            font-size: 0.72rem;
            letter-spacing: 0.5px;
        }

        .bar {
            height: 8px;
            width: 100%;
            border-radius: 20px;
            background: rgba(12, 33, 63, 0.92);
            overflow: hidden;
            border: 1px solid rgba(111, 173, 255, 0.2);
        }

        .bar i {
            display: block;
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
        }

        .inline-input {
            width: 100%;
            border: 1px solid rgba(111, 173, 255, 0.4);
            border-radius: 6px;
            background: #08203f;
            color: #e8f3ff;
            font: 600 0.78rem "Space Grotesk", sans-serif;
            padding: 6px 7px;
        }

        .inline-input.small {
            width: 86px;
            display: inline-block;
            text-align: center;
            padding: 4px 6px;
            font-size: 0.75rem;
        }

        .inline-group {
            display: grid;
            gap: 8px;
            margin-bottom: 10px;
        }

        .inline-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .inline-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            align-items: center;
            font-size: 0.76rem;
            color: #b8ceec;
        }

        .inline-label {
            display: block;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #a0b8db;
            margin-bottom: 4px;
        }

        .metric {
            display: grid;
            gap: 10px;
        }

        .metric-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
            font-size: 0.84rem;
        }

        .metric-item label { color: #bfd0e9; }
        .metric-score { font-weight: 700; color: #e8f3ff; }

        .summary-score {
            margin-top: 5px;
            border-top: 1px solid var(--line);
            padding-top: 8px;
            text-align: right;
            font-family: "Sora", sans-serif;
            font-size: 1.2rem;
            color: var(--accent-2);
        }

        .court {
            position: relative;
            margin-top: 8px;
            aspect-ratio: 16 / 9;
            border-radius: 10px;
            border: 1px solid var(--line);
            background:
                linear-gradient(180deg, rgba(6, 24, 50, 0.95), rgba(3, 15, 30, 0.95)),
                repeating-linear-gradient(90deg, rgba(77, 106, 153, 0.09) 0 2px, transparent 2px 40px);
            overflow: hidden;
        }

        .court svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .zone {
            position: absolute;
            color: #dcecff;
            font-weight: 700;
            text-align: center;
            transform: translate(-50%, -50%);
            font-size: 0.92rem;
            line-height: 1.1;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }

        .zone span {
            display: block;
            font-size: 0.79rem;
            margin-top: 3px;
        }

        .z1 { top: 25%; left: 18%; }
        .z2 { top: 17%; left: 50%; }
        .z3 { top: 25%; left: 82%; }
        .z4 { top: 48%; left: 12%; }
        .z5 { top: 46%; left: 50%; }
        .z6 { top: 48%; left: 88%; }
        .z7 { top: 81%; left: 24%; }
        .z8 { top: 81%; left: 50%; }
        .z9 { top: 81%; left: 76%; }

        .notes p {
            color: #d5e6fa;
            font-size: 0.88rem;
            line-height: 1.55;
            margin-top: 6px;
        }

        .notes .sign {
            display: flex;
            justify-content: space-between;
            color: #9db3d4;
            margin-top: 16px;
            font-size: 0.8rem;
            border-top: 1px solid var(--line);
            padding-top: 10px;
        }

        .saved-reports {
            margin-top: 10px;
            border-top: 1px solid var(--line);
            padding-top: 10px;
            max-height: 95px;
            overflow: auto;
            display: grid;
            gap: 6px;
        }

        .saved-reports div {
            font-size: 0.77rem;
            color: #b5c9e5;
            border: 1px solid rgba(111, 173, 255, 0.3);
            border-radius: 6px;
            padding: 6px;
            background: rgba(4, 19, 38, 0.66);
        }

        .notes-editor {
            display: none;
            margin-top: 8px;
        }

        .notes-editor.open {
            display: grid;
            gap: 8px;
        }

        .notes-editor textarea {
            min-height: 110px;
            resize: vertical;
        }

        .report textarea {
            width: 100%;
            min-height: 225px;
            border: 1px solid rgba(111, 173, 255, 0.3);
            border-radius: 10px;
            padding: 10px;
            background: #061b37;
            color: #e5f1ff;
            font: 500 0.83rem/1.5 "Space Grotesk", sans-serif;
            resize: vertical;
        }

        .report-actions {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .report-actions button {
            border: 1px solid var(--line);
            background: #08284d;
            color: #dff0ff;
            border-radius: 8px;
            padding: 8px 10px;
            cursor: pointer;
            font: 600 0.8rem "Space Grotesk", sans-serif;
        }

        .shot-editor {
            display: none;
            margin-top: 10px;
            border-top: 1px solid var(--line);
            padding-top: 10px;
            gap: 6px;
        }

        .shot-editor.open {
            display: grid;
        }

        .dock {
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background: rgba(4, 17, 34, 0.8);
        }

        .dock button {
            border: 1px solid transparent;
            background: rgba(17, 45, 84, 0.38);
            color: #d0dff5;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            font: 600 0.83rem "Space Grotesk", sans-serif;
        }

        .dock button.active {
            border-color: rgba(23, 217, 255, 0.85);
            background: rgba(23, 217, 255, 0.22);
        }

        @media (max-width: 1160px) {
            .app-shell { grid-template-columns: 84px 1fr; }
            .brand h1,
            .brand small,
            .menu span,
            .coach-card h3,
            .coach-card p,
            .coach-row div,
            .roster-card h3 { display: none; }
            .roster-list button { text-align: center; font-size: 0.72rem; }
            .menu button { text-align: center; padding: 11px 4px; font-size: 0.8rem; }
            .coach-card,
            .roster-card { display: grid; place-items: center; padding: 10px 5px; }
            .profile,
            .overall,
            .skills,
            .shot,
            .athleticism,
            .mentality,
            .iq,
            .notes,
            .report { grid-column: span 12; }
        }

        @media (max-width: 760px) {
            body { padding: 8px; }
            .app-shell { border-radius: 16px; grid-template-columns: 1fr; }
            .side {
                border-right: none;
                border-bottom: 1px solid var(--line);
                padding: 10px;
                gap: 10px;
            }
            .brand,
            .coach-card,
            .roster-card { display: none; }
            .menu { grid-template-columns: repeat(3, 1fr); }
            .menu button { text-align: center; padding: 9px 6px; }
            .topbar { flex-direction: column; align-items: flex-start; }
            .actions { width: 100%; display: grid; grid-template-columns: 1fr 1fr; }
            .actions button.primary,
            .actions button.warn { grid-column: span 2; }
            .stats-row { grid-template-columns: repeat(3, 1fr); }
            .dock { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="side">
            <div class="brand">
                <h1>A<span>4</span>B</h1>
                <small>Elite Academy</small>
            </div>

            <ul class="menu" id="menuTabs">
                <li><button class="active" data-tab="overview">Overview</button></li>
                <li><button data-tab="skills">Skills Evaluation</button></li>
                <li><button data-tab="athleticism">Athleticism</button></li>
                <li><button data-tab="iq">Basketball IQ</button></li>
                <li><button data-tab="mentality">Mentality</button></li>
                <li><button data-tab="chart">Shot Chart</button></li>
                <li><button data-tab="report">Notes & Report</button></li>
            </ul>

            <div class="roster-card">
                <h3>Roster</h3>
                <div class="roster-list" id="rosterList"></div>
            </div>

            <div class="coach-card">
                <h3>Elite Staff</h3>
                <p>Developing athletes and leaders.</p>
                <div class="coach-row">
                    <div class="coach-avatar"></div>
                    <div>
                        <strong style="font-size: 0.84rem; display: block;">Coach Alex</strong>
                        <span style="font-size: 0.75rem; color: var(--text-soft);">Head Coach</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main">
            <div class="topbar card">
                <h2>Player Evaluation Suite</h2>
                <div class="actions">
                    <select id="seasonSelect"></select>
                    <button id="toggleInlineEditBtn" class="edit">Inline Edit: Off</button>
                    <button id="generateReportBtn">Generate Report</button>
                    <button id="saveReportBtn" class="warn">Save Report</button>
                    <button id="copyReportBtn">Copy Report</button>
                    <button id="exportBtn" class="primary">Export PDF</button>
                </div>
            </div>

            <section class="grid" id="sectionGrid">
                <article class="card profile section-card" data-sections="overview">
                    <div class="avatar"></div>
                    <div>
                        <h3 class="player-name" id="playerName"></h3>
                        <p class="subline" id="playerSubtitle"></p>
                        <div class="stats-row" id="profileChips"></div>
                    </div>
                </article>

                <article class="card overall section-card" data-sections="overview">
                    <div class="ring-wrap" id="scoreRing" style="--score: 87;">
                        <div class="ring-score">
                            <b id="overallValue">87</b>
                            <small>Overall</small>
                        </div>
                    </div>
                    <ul class="trait-list" id="traitList"></ul>
                </article>

                <article class="card skills section-card" data-sections="overview skills">
                    <div class="card-title">
                        <span>Skills Evaluation</span>
                        <span>Live Ratings</span>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Category</th>
                                <th>Score</th>
                                <th>Comments</th>
                            </tr>
                        </thead>
                        <tbody id="skillsBody"></tbody>
                    </table>
                </article>

                <article class="card shot section-card" data-sections="overview chart">
                    <div class="card-title">
                        <span>Shot Chart</span>
                        <span id="fgDisplay"></span>
                    </div>
                    <div class="court">
                        <svg viewBox="0 0 100 60" aria-hidden="true">
                            <rect x="0" y="0" width="100" height="60" fill="none" stroke="rgba(240,246,255,0.45)" stroke-width="0.25"/>
                            <path d="M50,0 L50,18" stroke="rgba(240,246,255,0.5)" stroke-width="0.3"/>
                            <path d="M22,0 Q50,30 78,0" fill="none" stroke="rgba(240,246,255,0.6)" stroke-width="0.3"/>
                            <path d="M33,0 Q50,18 67,0" fill="none" stroke="rgba(240,246,255,0.35)" stroke-width="0.3"/>
                            <path d="M8,0 L8,36" stroke="rgba(240,246,255,0.4)" stroke-width="0.25"/>
                            <path d="M92,0 L92,36" stroke="rgba(240,246,255,0.4)" stroke-width="0.25"/>
                        </svg>
                        <div class="zone z1" data-zone="0"></div>
                        <div class="zone z2" data-zone="1"></div>
                        <div class="zone z3" data-zone="2"></div>
                        <div class="zone z4" data-zone="3"></div>
                        <div class="zone z5" data-zone="4"></div>
                        <div class="zone z6" data-zone="5"></div>
                        <div class="zone z7" data-zone="6"></div>
                        <div class="zone z8" data-zone="7"></div>
                        <div class="zone z9" data-zone="8"></div>
                    </div>
                    <div class="shot-editor" id="shotEditor"></div>
                </article>

                <article class="card metric athleticism section-card" data-sections="overview athleticism">
                    <div class="card-title"><span>Athleticism</span><span id="athScoreLabel"></span></div>
                    <div id="athInlineMeta"></div>
                    <div id="athMetrics"></div>
                    <div class="summary-score" id="athSummary"></div>
                </article>

                <article class="card metric iq section-card" data-sections="overview iq">
                    <div class="card-title"><span>Basketball IQ</span><span id="iqScoreLabel"></span></div>
                    <div id="iqInlineMeta"></div>
                    <div id="iqMetrics"></div>
                    <div class="summary-score" style="color: var(--accent-3);" id="iqSummary"></div>
                </article>

                <article class="card metric mentality section-card" data-sections="overview mentality">
                    <div class="card-title"><span>Mentality</span><span id="menScoreLabel"></span></div>
                    <div id="menInlineMeta"></div>
                    <div id="menMetrics"></div>
                    <div class="summary-score" style="color: var(--accent);" id="menSummary"></div>
                </article>

                <article class="card notes section-card" data-sections="overview report">
                    <div class="card-title"><span>Notes</span><span id="recruitScore"></span></div>
                    <p id="coachNotes"></p>
                    <div class="sign" id="notesSign">
                        <span id="coachName"></span>
                        <span id="coachDate"></span>
                    </div>
                    <div class="notes-editor" id="notesEditor"></div>
                    <div class="saved-reports" id="savedReports"></div>
                </article>

                <article class="card report section-card" data-sections="overview report">
                    <div class="card-title"><span>Report</span><span>Generated Output</span></div>
                    <textarea id="reportOutput" readonly></textarea>
                    <div class="report-actions">
                        <button id="downloadReportBtn">Download TXT</button>
                    </div>
                </article>
            </section>

            <nav class="dock" id="dockNav">
                <button class="active">Evaluations</button>
                <button>Calendar</button>
                <button>Messages</button>
                <button>Reports</button>
                <button>Settings</button>
            </nav>
        </main>
    </div>

    <script>
        const data = {
            players: [
                {
                    id: "jordan-williams",
                    name: "Jordan Williams",
                    number: 23,
                    role: "Shooting Guard",
                    team: "A4B Elite U16",
                    age: 16,
                    height: "6'2\"",
                    weight: "170 lbs",
                    wingspan: "6'5\"",
                    classYear: 2026,
                    starterRole: "Starter",
                    seasons: {
                        "2023-2024": {
                            overall: 87,
                            fg: "FG 44%",
                            potential: "4.5/5",
                            nextLevel: "High D1",
                            nbaPotential: "2nd Round",
                            overallTier: "Elite",
                            recruitScore: 86,
                            coachName: "Coach Alex",
                            coachDate: "May 21, 2024",
                            coachNotes: "High upside perimeter athlete with elite shot prep and strong pace variation. Needs continued gains in core strength to improve contact finishing.",
                            skillRows: [
                                ["Shooting", 8.5, "Consistent form and deep range."],
                                ["Finishing", 8.0, "Strong with both hands at rim."],
                                ["Ball Handling", 9.0, "Excellent pace and pressure control."],
                                ["Passing", 8.0, "Creates windows early off pick action."],
                                ["Defense", 8.5, "Active hands with smart rotations."],
                                ["Basketball IQ", 8.8, "Reads second help before attack."]
                            ],
                            shotZones: [
                                ["38%", "5/13"], ["62%", "16/26"], ["42%", "5/12"],
                                ["41%", "7/17"], ["55%", "11/20"], ["40%", "6/15"],
                                ["35%", "7/20"], ["39%", "9/23"], ["34%", "6/18"]
                            ],
                            athleticism: {
                                score: 82,
                                metrics: [["Speed", 8.5], ["Agility", 8.0], ["Vertical", 8.5], ["Strength", 7.5], ["Endurance", 8.0]]
                            },
                            basketballIQ: {
                                score: 85,
                                metrics: [["Decision Making", 8.7], ["Court Vision", 8.6], ["Spacing Reads", 8.4], ["Help Recognition", 8.3], ["Pace Control", 8.5]]
                            },
                            mentality: {
                                score: 85,
                                metrics: [["Work Ethic", 9.0], ["Competitiveness", 9.0], ["Coachability", 8.5], ["Focus", 8.0], ["Leadership", 8.0]]
                            }
                        }
                    }
                },
                {
                    id: "marcus-reed",
                    name: "Marcus Reed",
                    number: 11,
                    role: "Point Guard",
                    team: "A4B Elite U17",
                    age: 17,
                    height: "6'0\"",
                    weight: "162 lbs",
                    wingspan: "6'3\"",
                    classYear: 2025,
                    starterRole: "Lead Guard",
                    seasons: {
                        "2023-2024": {
                            overall: 84,
                            fg: "FG 42%",
                            potential: "4.2/5",
                            nextLevel: "Mid-High D1",
                            nbaPotential: "G League Path",
                            overallTier: "Elite",
                            recruitScore: 84,
                            coachName: "Coach Alex",
                            coachDate: "May 20, 2024",
                            coachNotes: "Natural organizer with advanced feel in transition. Physical development is the main swing skill for next-level projection.",
                            skillRows: [
                                ["Shooting", 8.2, "Reliable pull-up from elbows."],
                                ["Finishing", 7.6, "Needs stronger off-hand touch."],
                                ["Ball Handling", 8.9, "Elite split dribble timing."],
                                ["Passing", 9.2, "Finds weak-side tags early."],
                                ["Defense", 7.9, "Competes but can be screened."],
                                ["Basketball IQ", 8.8, "Controls pace with confidence."]
                            ],
                            shotZones: [
                                ["34%", "6/18"], ["58%", "14/24"], ["40%", "6/15"],
                                ["39%", "9/23"], ["52%", "11/21"], ["38%", "8/21"],
                                ["33%", "7/21"], ["37%", "9/24"], ["34%", "6/18"]
                            ],
                            athleticism: {
                                score: 80,
                                metrics: [["Speed", 8.4], ["Agility", 8.7], ["Vertical", 7.7], ["Strength", 7.1], ["Endurance", 8.1]]
                            },
                            basketballIQ: {
                                score: 87,
                                metrics: [["Decision Making", 8.9], ["Court Vision", 9.2], ["Spacing Reads", 8.5], ["Help Recognition", 8.4], ["Pace Control", 8.8]]
                            },
                            mentality: {
                                score: 86,
                                metrics: [["Work Ethic", 9.1], ["Competitiveness", 8.9], ["Coachability", 8.5], ["Focus", 8.6], ["Leadership", 8.7]]
                            }
                        }
                    }
                }
            ]
        };

        const reportStoreKey = "a4b_saved_reports";
        const state = {
            playerId: data.players[0].id,
            season: Object.keys(data.players[0].seasons)[0],
            activeTab: "overview",
            inlineEdit: false
        };

        const refs = {
            rosterList: document.getElementById("rosterList"),
            seasonSelect: document.getElementById("seasonSelect"),
            playerName: document.getElementById("playerName"),
            playerSubtitle: document.getElementById("playerSubtitle"),
            profileChips: document.getElementById("profileChips"),
            scoreRing: document.getElementById("scoreRing"),
            overallValue: document.getElementById("overallValue"),
            traitList: document.getElementById("traitList"),
            skillsBody: document.getElementById("skillsBody"),
            fgDisplay: document.getElementById("fgDisplay"),
            athScoreLabel: document.getElementById("athScoreLabel"),
            iqScoreLabel: document.getElementById("iqScoreLabel"),
            menScoreLabel: document.getElementById("menScoreLabel"),
            athInlineMeta: document.getElementById("athInlineMeta"),
            iqInlineMeta: document.getElementById("iqInlineMeta"),
            menInlineMeta: document.getElementById("menInlineMeta"),
            athMetrics: document.getElementById("athMetrics"),
            iqMetrics: document.getElementById("iqMetrics"),
            menMetrics: document.getElementById("menMetrics"),
            athSummary: document.getElementById("athSummary"),
            iqSummary: document.getElementById("iqSummary"),
            menSummary: document.getElementById("menSummary"),
            recruitScore: document.getElementById("recruitScore"),
            coachNotes: document.getElementById("coachNotes"),
            coachName: document.getElementById("coachName"),
            coachDate: document.getElementById("coachDate"),
            notesSign: document.getElementById("notesSign"),
            notesEditor: document.getElementById("notesEditor"),
            shotEditor: document.getElementById("shotEditor"),
            savedReports: document.getElementById("savedReports"),
            reportOutput: document.getElementById("reportOutput"),
            toggleInlineEditBtn: document.getElementById("toggleInlineEditBtn")
        };

        function currentPlayer() {
            return data.players.find((player) => player.id === state.playerId);
        }

        function currentSeasonData() {
            const player = currentPlayer();
            return player.seasons[state.season];
        }

        function buildRoster() {
            refs.rosterList.innerHTML = "";
            for (const player of data.players) {
                const button = document.createElement("button");
                button.type = "button";
                button.dataset.playerId = player.id;
                button.innerHTML = `${player.name} <small>#${player.number} | ${player.role}</small>`;
                if (player.id === state.playerId) button.classList.add("active");
                button.addEventListener("click", () => {
                    state.playerId = player.id;
                    const keys = Object.keys(player.seasons);
                    if (!keys.includes(state.season)) state.season = keys[0];
                    populateSeasonSelect();
                    render();
                });
                refs.rosterList.appendChild(button);
            }
        }

        function populateSeasonSelect() {
            const player = currentPlayer();
            const seasons = Object.keys(player.seasons);
            refs.seasonSelect.innerHTML = seasons.map((season) => `<option value="${season}">${season} Season</option>`).join("");
            refs.seasonSelect.value = state.season;
        }

        function renderProfile(player) {
            refs.playerName.innerHTML = `${player.name} <span>#${player.number}</span>`;
            refs.playerSubtitle.textContent = `${player.role} | ${player.team}`;
            const chips = [
                ["Age", player.age],
                ["Height", player.height],
                ["Weight", player.weight],
                ["Wingspan", player.wingspan],
                ["Class", player.classYear],
                ["Team", player.team.split(" ").slice(0, 2).join(" ")],
                ["Role", player.starterRole]
            ];
            refs.profileChips.innerHTML = chips.map(([label, value]) => `<div class="chip"><strong>${label}</strong><span>${value}</span></div>`).join("");
        }

        function renderSkills(skillRows) {
            refs.skillsBody.innerHTML = skillRows.map(([name, score, comment], idx) => {
                const width = Math.max(0, Math.min(100, Number(score) * 10));
                const skillName = state.inlineEdit
                    ? `<input class="inline-input" data-edit="skill-name" data-index="${idx}" value="${name}">`
                    : name;
                const skillScore = state.inlineEdit
                    ? `<input class="inline-input small" data-edit="skill-score" data-index="${idx}" type="number" step="0.1" value="${score}">`
                    : Number(score).toFixed(1);
                const skillComment = state.inlineEdit
                    ? `<input class="inline-input" data-edit="skill-comment" data-index="${idx}" value="${comment}">`
                    : comment;
                return `
                    <tr>
                        <td>${skillName}</td>
                        <td style="width: 170px;">
                            <div style="display: grid; gap: 6px;">
                                <div class="bar"><i style="width: ${width}%;"></i></div>
                                ${skillScore}
                            </div>
                        </td>
                        <td>${skillComment}</td>
                    </tr>
                `;
            }).join("");
        }

        function renderMetrics(container, metrics, moduleKey) {
            container.innerHTML = metrics.map(([name, score], idx) => {
                const numeric = Number(score) || 0;
                const width = Math.max(0, Math.min(100, numeric * 10));
                const nameCell = state.inlineEdit
                    ? `<input class="inline-input" data-edit="metric-name" data-module="${moduleKey}" data-index="${idx}" value="${name}">`
                    : name;
                const scoreCell = state.inlineEdit
                    ? `<input class="inline-input small" data-edit="metric-score" data-module="${moduleKey}" data-index="${idx}" type="number" step="0.1" value="${numeric}">`
                    : numeric.toFixed(1);
                return `
                    <div class="metric-item">
                        <label>${nameCell}</label>
                        <span class="metric-score">${scoreCell}</span>
                        <div class="bar" style="grid-column: span 2;"><i style="width: ${width}%"></i></div>
                    </div>
                `;
            }).join("");
        }

        function renderShotZones(zones) {
            const zoneElements = document.querySelectorAll(".zone");
            zoneElements.forEach((zoneElement, index) => {
                const zone = zones[index] || ["0%", "0/0"];
                zoneElement.innerHTML = `${zone[0]}<span>${zone[1]}</span>`;
            });

            if (!state.inlineEdit) {
                refs.shotEditor.classList.remove("open");
                refs.shotEditor.innerHTML = "";
                return;
            }

            refs.shotEditor.classList.add("open");
            refs.shotEditor.innerHTML = zones.map((zone, index) => `
                <div class="inline-row">
                    <span>Zone ${index + 1}</span>
                    <div class="inline-grid">
                        <input class="inline-input" data-edit="shot-percent" data-index="${index}" value="${zone[0]}">
                        <input class="inline-input" data-edit="shot-made" data-index="${index}" value="${zone[1]}">
                    </div>
                </div>
            `).join("");
        }

        function renderNotesEditor(season) {
            if (!state.inlineEdit) {
                refs.notesEditor.classList.remove("open");
                refs.notesEditor.innerHTML = "";
                refs.coachNotes.style.display = "block";
                refs.notesSign.style.display = "flex";
                return;
            }

            refs.coachNotes.style.display = "none";
            refs.notesSign.style.display = "none";
            refs.notesEditor.classList.add("open");
            refs.notesEditor.innerHTML = `
                <div class="inline-grid">
                    <label>
                        <span class="inline-label">Recruitment Score</span>
                        <input class="inline-input" type="number" data-edit="recruit-score" value="${season.recruitScore}">
                    </label>
                    <label>
                        <span class="inline-label">Coach Name</span>
                        <input class="inline-input" data-edit="coach-name" value="${season.coachName}">
                    </label>
                </div>
                <label>
                    <span class="inline-label">Coach Date</span>
                    <input class="inline-input" data-edit="coach-date" value="${season.coachDate}">
                </label>
                <label>
                    <span class="inline-label">Notes</span>
                    <textarea class="inline-input" data-edit="coach-notes">${season.coachNotes}</textarea>
                </label>
            `;
        }

        function renderModuleScoreEditors(season) {
            if (!state.inlineEdit) {
                refs.athInlineMeta.innerHTML = "";
                refs.iqInlineMeta.innerHTML = "";
                refs.menInlineMeta.innerHTML = "";
                return;
            }

            refs.athInlineMeta.innerHTML = `
                <div class="inline-group">
                    <label>
                        <span class="inline-label">Athleticism Total Score</span>
                        <input class="inline-input" type="number" data-edit="module-score" data-module="athleticism" value="${season.athleticism.score}">
                    </label>
                </div>
            `;

            refs.iqInlineMeta.innerHTML = `
                <div class="inline-group">
                    <label>
                        <span class="inline-label">Basketball IQ Total Score</span>
                        <input class="inline-input" type="number" data-edit="module-score" data-module="basketballIQ" value="${season.basketballIQ.score}">
                    </label>
                </div>
            `;

            refs.menInlineMeta.innerHTML = `
                <div class="inline-group">
                    <label>
                        <span class="inline-label">Mentality Total Score</span>
                        <input class="inline-input" type="number" data-edit="module-score" data-module="mentality" value="${season.mentality.score}">
                    </label>
                </div>
            `;
        }

        function buildReport(player, season) {
            return [
                `A4B ELITE PLAYER REPORT`,
                `========================`,
                `Player: ${player.name} #${player.number}`,
                `Role/Team: ${player.role} | ${player.team}`,
                `Season: ${state.season}`,
                `Overall: ${season.overall} (${season.overallTier})`,
                `Potential: ${season.potential}`,
                `Next Level: ${season.nextLevel}`,
                `NBA Potential: ${season.nbaPotential}`,
                ``,
                `SKILLS EVALUATION`,
                ...season.skillRows.map((row) => `- ${row[0]}: ${row[1]} | ${row[2]}`),
                ``,
                `ATHLETICISM (${season.athleticism.score})`,
                ...season.athleticism.metrics.map((item) => `- ${item[0]}: ${item[1]}`),
                ``,
                `BASKETBALL IQ (${season.basketballIQ.score})`,
                ...season.basketballIQ.metrics.map((item) => `- ${item[0]}: ${item[1]}`),
                ``,
                `MENTALITY (${season.mentality.score})`,
                ...season.mentality.metrics.map((item) => `- ${item[0]}: ${item[1]}`),
                ``,
                `SHOT CHART`,
                ...season.shotZones.map((zone, idx) => `- Zone ${idx + 1}: ${zone[0]} (${zone[1]})`),
                ``,
                `COACH NOTES`,
                season.coachNotes,
                ``,
                `Recruitment Score: ${season.recruitScore}`,
                `Coach: ${season.coachName} | Date: ${season.coachDate}`
            ].join("\n");
        }

        function renderReport(player, season) {
            refs.reportOutput.value = buildReport(player, season);
        }

        function reportRecords() {
            try {
                const records = JSON.parse(localStorage.getItem(reportStoreKey) || "[]");
                return Array.isArray(records) ? records : [];
            } catch {
                return [];
            }
        }

        function renderSavedReports() {
            const records = reportRecords();
            if (!records.length) {
                refs.savedReports.innerHTML = "<div>No saved reports yet.</div>";
                return;
            }

            refs.savedReports.innerHTML = records.map((record) =>
                `<div>${record.player} | ${record.season} | OVR ${record.overall} | ${record.createdAt}</div>`
            ).join("");
        }

        function saveReport() {
            const player = currentPlayer();
            const season = currentSeasonData();
            const records = reportRecords();

            records.unshift({
                id: `${player.id}-${state.season}-${Date.now()}`,
                player: player.name,
                season: state.season,
                overall: season.overall,
                createdAt: new Date().toLocaleString()
            });

            localStorage.setItem(reportStoreKey, JSON.stringify(records.slice(0, 12)));
            renderSavedReports();
            alert("Report snapshot saved.");
        }

        function applyTabView(tabName) {
            const cards = document.querySelectorAll(".section-card");
            for (const card of cards) {
                const tabs = card.dataset.sections.split(" ");
                const show = tabName === "overview" || tabs.includes(tabName);
                card.classList.toggle("hidden", !show);
            }
        }

        function render() {
            const player = currentPlayer();
            const season = currentSeasonData();

            buildRoster();
            renderProfile(player);

            refs.scoreRing.style.setProperty("--score", season.overall);
            refs.overallValue.textContent = season.overall;
            refs.traitList.innerHTML = `
                <li><span>Potential</span><span>${season.potential}</span></li>
                <li><span>Next Level</span><span>${season.nextLevel}</span></li>
                <li><span>NBA Potential</span><span>${season.nbaPotential}</span></li>
                <li><span>Overall</span><span>${season.overallTier}</span></li>
            `;

            refs.fgDisplay.textContent = season.fg;
            renderSkills(season.skillRows);
            renderShotZones(season.shotZones);
            renderModuleScoreEditors(season);
            renderNotesEditor(season);

            refs.athScoreLabel.textContent = `${season.athleticism.score} / 100`;
            refs.iqScoreLabel.textContent = `${season.basketballIQ.score} / 100`;
            refs.menScoreLabel.textContent = `${season.mentality.score} / 100`;

            renderMetrics(refs.athMetrics, season.athleticism.metrics, "athleticism");
            renderMetrics(refs.iqMetrics, season.basketballIQ.metrics, "basketballIQ");
            renderMetrics(refs.menMetrics, season.mentality.metrics, "mentality");

            refs.athSummary.textContent = season.athleticism.score;
            refs.iqSummary.textContent = season.basketballIQ.score;
            refs.menSummary.textContent = season.mentality.score;

            refs.recruitScore.textContent = `Recruitment ${season.recruitScore} / 100`;
            refs.coachNotes.textContent = season.coachNotes;
            refs.coachName.textContent = season.coachName;
            refs.coachDate.textContent = season.coachDate;

            renderReport(player, season);
            renderSavedReports();
            applyTabView(state.activeTab);
        }

        refs.seasonSelect.addEventListener("change", (event) => {
            state.season = event.target.value;
            render();
        });

        document.getElementById("menuTabs").addEventListener("click", (event) => {
            const button = event.target.closest("button");
            if (!button) return;
            for (const btn of document.querySelectorAll("#menuTabs button")) btn.classList.remove("active");
            button.classList.add("active");
            state.activeTab = button.dataset.tab;
            applyTabView(state.activeTab);
        });

        document.getElementById("sectionGrid").addEventListener("change", (event) => {
            if (!state.inlineEdit) return;
            const target = event.target;
            const season = currentSeasonData();
            const editKey = target.dataset.edit;
            if (!editKey) return;

            if (editKey === "skill-name") {
                season.skillRows[Number(target.dataset.index)][0] = target.value;
            } else if (editKey === "skill-score") {
                season.skillRows[Number(target.dataset.index)][1] = Number(target.value) || 0;
            } else if (editKey === "skill-comment") {
                season.skillRows[Number(target.dataset.index)][2] = target.value;
            } else if (editKey === "metric-name") {
                season[target.dataset.module].metrics[Number(target.dataset.index)][0] = target.value;
            } else if (editKey === "metric-score") {
                season[target.dataset.module].metrics[Number(target.dataset.index)][1] = Number(target.value) || 0;
            } else if (editKey === "module-score") {
                season[target.dataset.module].score = Number(target.value) || 0;
            } else if (editKey === "shot-percent") {
                season.shotZones[Number(target.dataset.index)][0] = target.value;
            } else if (editKey === "shot-made") {
                season.shotZones[Number(target.dataset.index)][1] = target.value;
            } else if (editKey === "recruit-score") {
                season.recruitScore = Number(target.value) || 0;
            } else if (editKey === "coach-name") {
                season.coachName = target.value;
            } else if (editKey === "coach-date") {
                season.coachDate = target.value;
            } else if (editKey === "coach-notes") {
                season.coachNotes = target.value;
            }

            render();
        });

        document.getElementById("dockNav").addEventListener("click", (event) => {
            const button = event.target.closest("button");
            if (!button) return;
            for (const btn of document.querySelectorAll("#dockNav button")) btn.classList.remove("active");
            button.classList.add("active");
        });

        document.getElementById("generateReportBtn").addEventListener("click", () => {
            const player = currentPlayer();
            const season = currentSeasonData();
            renderReport(player, season);
            alert("Report regenerated from current evaluation data.");
        });

        document.getElementById("copyReportBtn").addEventListener("click", async () => {
            try {
                await navigator.clipboard.writeText(refs.reportOutput.value);
                alert("Report copied to clipboard.");
            } catch {
                alert("Clipboard access failed. You can copy manually from the report box.");
            }
        });

        document.getElementById("downloadReportBtn").addEventListener("click", () => {
            const player = currentPlayer();
            const filename = `${player.id}-${state.season}-report.txt`.replace(/\s+/g, "-");
            const blob = new Blob([refs.reportOutput.value], { type: "text/plain;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
        });

        document.getElementById("saveReportBtn").addEventListener("click", saveReport);
        document.getElementById("exportBtn").addEventListener("click", () => window.print());

        refs.toggleInlineEditBtn.addEventListener("click", () => {
            state.inlineEdit = !state.inlineEdit;
            refs.toggleInlineEditBtn.textContent = state.inlineEdit ? "Inline Edit: On" : "Inline Edit: Off";
            render();
        });

        populateSeasonSelect();
        render();
    </script>
</body>
</html>
